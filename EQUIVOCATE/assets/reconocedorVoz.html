<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reconocedor de voz</title>
</head>
<body>
    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ tipo: 'error', mensaje: 'API no soportada' }));
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true; // Fundamental para que el juego reaccione rápido
        recognition.lang = 'es-ES';

        let activo = false;

        window.addEventListener('message', (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.accion === 'iniciar') {
                    activo = true;
                    recognition.start();
                } else if (data.accion === 'detener') {
                    activo = false;
                    recognition.stop();
                }
            } catch (e) {
                console.error("Error en mensaje recibido:", e);
            }
        });

        recognition.onresult = (event) => {
            // LOG DE SALIDA
            console.log("HTML -> Enviando a RN:", transcripcion);
            
            // Solo nos interesa el último fragmento escuchado para que la trampa sea precisa
            const resultIndex = event.resultIndex;
            const transcripcion = event.results[resultIndex][0].transcript;

            window.ReactNativeWebView.postMessage(JSON.stringify({
                tipo: 'resultado',
                texto: transcripcion.toLowerCase()
            }));
        };

        recognition.onend = () => {
            // Si el juego sigue activo pero el micro se cortó por silencio, lo reiniciamos
            if (activo) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log("Reintentando inicio de voz...");
                }
            }
        };

        recognition.onerror = (event) => {
            window.ReactNativeWebView.postMessage(JSON.stringify({ 
                tipo: 'error', 
                error: event.error 
            }));
        };
    </script>
</body>
</html>
