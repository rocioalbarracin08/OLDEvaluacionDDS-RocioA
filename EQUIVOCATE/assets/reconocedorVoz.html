<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Reconocedor de voz</title>
</head>
<body>
    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ tipo: 'error', mensaje: 'API no soportada' }));
        }

        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true; // Fundamental para que el juego reaccione rápido
        recognition.lang = 'es-ES';

        let activo = false;

        window.addEventListener('message', (event) => {
            try {
                const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
                if (data.accion === 'iniciar') {
                    activo = true;
                    recognition.start();
                } else if (data.accion === 'detener') {
                    activo = false;
                    recognition.stop();
                }
            } catch (e) {
                console.error("Error en mensaje recibido:", e);
            }
        });

        recognition.onresult = (event) => {
            try {
                // Tomar el último resultado disponible (interim o final)
                const lastResult = event.results[event.results.length - 1];
                const transcripcion = (lastResult && lastResult[0] && lastResult[0].transcript) ? lastResult[0].transcript : '';
                
                // LOG DE SALIDA
                console.log("HTML -> Enviando a RN:", transcripcion);
                
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    tipo: 'resultado',
                    texto: transcripcion.toLowerCase()
                }));
            } catch (e) {
                console.error('Error en onresult:', e);
            }
        };

        recognition.onend = () => {
            // Si el juego sigue activo pero el micro se cortó por silencio, lo reiniciamos
            if (activo) {
                try {
                    recognition.start();
                } catch (e) {
                    console.log("Reintentando inicio de voz...", e);
                }
            }
        };

        recognition.onerror = (event) => {
            window.ReactNativeWebView.postMessage(JSON.stringify({ 
                tipo: 'error', 
                error: event.error 
            }));
        };
    </script>
</body>
</html>
